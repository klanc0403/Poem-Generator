<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>AI Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to the AI Poem Generator</h1>

      <main>
        <form id="poem-generator">
          <input
            type="text"
            id="user-instructions"
            class="instructions"
            placeholder="Enter a topic or subject (i.e. flowers, New York)"
            autofocus
            required
          />
          <input type="submit" class="submit-button" value="Generate" />
        </form>

        <div class="poem hidden" id="poem"></div>
      </main>

      <footer>
        This project was coded by Kelly Lançon, is hosted on
        <a href="https://github.com/klanc0403" target="_blank">GitHub.
      </footer>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
