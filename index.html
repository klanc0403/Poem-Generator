<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <title>AI Poem Generator</title>
</head>
<body>
    <div class="container">
    <h1> Welcome to the AI Poem Generator</h1>

    <main>
        <form id="poem-generator">
            <input type="text" placeholder="Enter a topic or subject" 
            autofocus
            required
            class="instructions"/>
            <input type="submit" class="submit-button" />
        </form>

        <div class="poem" id="poem">

        </div>

    </main>

    <footer> This project was coded by Kelly Lançon, is open-sourced on <a href="https://github.com/klanc0403" target="_blank">Github</a>, and hosted on <a href="https://kslaipoemgenerator.netlify.app/" target="_blank">Netlify</a>.</footer>
    <script src="src/index.js"></script>
</div>
</body>

</html>
